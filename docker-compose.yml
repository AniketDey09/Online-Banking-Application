version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: bankapp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Aniket@92001
      MYSQL_DATABASE: bankapp
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  bankapp:
    build: .
    container_name: bankapp-app
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bankapp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Aniket@92001
    restart: always

volumes:
  mysql_data:
